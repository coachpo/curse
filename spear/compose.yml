# Beacon Spear — Docker Compose production deployment
#
# Architecture:
#   Caddy (reverse proxy, auto-HTTPS)
#     ├── /api/*, /healthz, /admin/* → backend (gunicorn:8100 + delivery worker)
#     └── /*                         → frontend (nginx:3100)
#
# SQLite note: gunicorn and the delivery worker run in the SAME container
# because SQLite WAL mode requires shared memory (-shm file) between
# processes — this doesn't work reliably across container boundaries.
#
# Usage:
#   cp env.example .env   # fill in real values
#   docker compose up -d
#   docker compose logs -f

services:

  # ── Reverse proxy (automatic HTTPS via Let's Encrypt) ─────────────────────
  caddy:
    image: caddy:2-alpine
    container_name: spear-caddy
    restart: unless-stopped
    ports:
      - "${SPEAR_HTTP_PORT:-80}:80"
      - "${SPEAR_HTTPS_PORT:-443}:443"
      - "${SPEAR_HTTPS_PORT:-443}:443/udp"   # HTTP/3 (QUIC)
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data       # TLS certs — must be a named volume
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - public
      - internal

  # ── Django + Gunicorn + Delivery Worker ───────────────────────────────────
  # Single container runs both processes to keep SQLite WAL safe.
  backend:
    image: ghcr.io/${GHCR_OWNER}/beacon-spear-backend:${IMAGE_TAG:-latest}
    container_name: spear-backend
    restart: unless-stopped
    entrypoint: ["/bin/sh", "/app/entrypoint.sh"]
    expose:
      - "8100"
    env_file: .env
    environment:
      - DATABASE_URL=sqlite:////app/data/db.sqlite3
    volumes:
      - ./entrypoint.sh:/app/entrypoint.sh:ro
      - sqlite_data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8100/healthz')\""]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - internal
      - public    # outbound access for Bark/ntfy/MQTT delivery

  # ── React SPA (nginx) ────────────────────────────────────────────────────
  frontend:
    image: ghcr.io/${GHCR_OWNER}/beacon-spear-frontend:${IMAGE_TAG:-latest}
    container_name: spear-frontend
    restart: unless-stopped
    expose:
      - "3100"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/healthz > /dev/null"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - internal

volumes:
  sqlite_data:       # SQLite DB + WAL files — mount the directory, never the file
  caddy_data:        # Let's Encrypt certs and ACME state
  caddy_config:      # Caddy runtime config cache

networks:
  public:
    driver: bridge
  internal:
    driver: bridge
    internal: true   # frontend has no direct internet egress
