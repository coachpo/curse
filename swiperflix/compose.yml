services:
  reverse-proxy:
    image: nginx:1.27-alpine
    depends_on:
      frontend:
        condition: service_healthy
      gateway:
        condition: service_healthy
    ports:
      - "${SWIPERFLIX_PORT:-8084}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    networks:
      - web

  frontend:
    image: ghcr.io/coachpo/swiperflix-player:${SWIPERFLIX_VERSION:-latest}
    expose:
      - "3000"
    restart: unless-stopped
    networks:
      - web
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O - http://127.0.0.1:3000/ >/dev/null 2>&1 || exit 1",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  gateway:
    image: ghcr.io/coachpo/swiperflix-gateway:${SWIPERFLIX_VERSION:-latest}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      OPENLIST_API_BASE_URL: ${OPENLIST_API_BASE_URL:-http://host.docker.internal:5244}
      OPENLIST_DIR_PATH: ${OPENLIST_DIR_PATH:-/}
      OPENLIST_PASSWORD: ${OPENLIST_PASSWORD:-}
      OPENLIST_TOKEN: ${OPENLIST_TOKEN:-}
      OPENLIST_USERNAME: ${OPENLIST_USERNAME:-}
      OPENLIST_USER_PASSWORD: ${OPENLIST_USER_PASSWORD:-}
      OPENLIST_PUBLIC_BASE_URL: ${OPENLIST_PUBLIC_BASE_URL:-}
      DATABASE_URL: sqlite:////data/swiperflix.db
      HOST: 0.0.0.0
      PORT: "8000"
    expose:
      - "8000"
    volumes:
      - gateway-data:/data
    restart: unless-stopped
    networks:
      - web
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/docs').read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

networks:
  web:
    driver: bridge

volumes:
  gateway-data:
