services:
  cli-proxy-api:
    image: eceasy/cli-proxy-api:${CLI_PROXY_API_VERSION:-latest}
    restart: unless-stopped
    ports:
      - "${CLI_PROXY_API_PORT:-8317}:8317"
    environment:
      TZ: ${CLI_PROXY_API_TZ:-Europe/Helsinki}
    volumes:
      - "./config.yaml:/CLIProxyAPI/config.yaml"
      - "./state/auth:/root/.cli-proxy-api"
    logging:
      driver: json-file
      options:
        max-size: 128m
        max-file: "5"
    networks:
      - cli-proxy-api-network

networks:
  cli-proxy-api-network:
    driver: bridge
