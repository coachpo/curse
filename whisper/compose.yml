services:
  reverse-proxy:
    image: caddy:2.8-alpine
    container_name: lw-reverse-proxy
    restart: unless-stopped
    ports:
      - "${WHISPER_PORT:-8085}:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - frontend_net
      - backend_net

  backend:
    image: "${BACKEND_IMAGE:-last-whisper-backend:prod}"
    container_name: lw-backend
    build:
      context: ../last-whisper-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      ENVIRONMENT: production
      LOG_LEVEL: "${BACKEND_LOG_LEVEL:-info}"
      API_KEYS_CSV: "${BACKEND_API_KEYS_CSV}"
      CORS_ORIGINS: "${BACKEND_CORS_ORIGINS}"
      TTS_PROVIDER: "${BACKEND_TTS_PROVIDER:-google}"
      TTS_SUPPORTED_LANGUAGES: "${BACKEND_TTS_SUPPORTED_LANGUAGES:-[\"fi\"]}"
      DATABASE_URL: "${BACKEND_DATABASE_URL:-sqlite:///data/dictation.db}"
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/google_credentials
    volumes:
      - backend_data:/app/data
      - backend_audio:/app/audio
    secrets:
      - source: google_credentials
        target: google_credentials
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - backend_net

  frontend:
    image: "${FRONTEND_IMAGE:-last-whisper-frontend:prod}"
    container_name: lw-frontend
    build:
      context: ../last-whisper-frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "${FRONTEND_NEXT_PUBLIC_API_URL:-/apis}"
        NEXT_PUBLIC_API_KEY: "${FRONTEND_NEXT_PUBLIC_API_KEY}"
        NEXT_PUBLIC_DEBUG_LOGGING: "${FRONTEND_NEXT_PUBLIC_DEBUG_LOGGING:-false}"
        NODE_ENV: production
        PORT: 3000
        HOSTNAME: 0.0.0.0
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - frontend_net

secrets:
  google_credentials:
    file: "${GOOGLE_APPLICATION_CREDENTIALS_FILE:-./secrets/google-credentials.json}"

volumes:
  backend_data:
  backend_audio:
  caddy_data:
  caddy_config:

networks:
  frontend_net:
    driver: bridge
  backend_net:
    driver: bridge
