services:
  n8n:
    image: docker.n8n.io/n8nio/n8n
    restart: unless-stopped
    ports:
      - "${N8N_PORT:-8091}:5678"
    environment:
      N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS: "true"
      N8N_SECURE_COOKIE: "false"
      GENERIC_TIMEZONE: ${N8N_TZ:-Europe/Helsinki}
      TZ: ${N8N_TZ:-Europe/Helsinki}
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - n8n-network

volumes:
  n8n_data:
    name: n8n_data
    driver: local

networks:
  n8n-network:
    driver: bridge
