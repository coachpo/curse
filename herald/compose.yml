name: herald

services:
  reverse-proxy:
    image: nginx:1.27-alpine
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    ports:
      - "${HERALD_PORT:-8081}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - herald
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    image: ghcr.io/coachpo/herald-frontend:${HERALD_VERSION:-latest}
    expose:
      - "3100"
    networks:
      - herald
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:3100/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  backend:
    image: ghcr.io/coachpo/herald-backend:${HERALD_VERSION:-latest}
    env_file:
      - ./backend.env
    environment:
      DJANGO_DEBUG: "false"
      DJANGO_ALLOWED_HOSTS: "*"
      DATABASE_URL: sqlite:////data/db.sqlite3
      SQLITE_TIMEOUT_SECONDS: "30"
      WEB_CONCURRENCY: "2"
      JWT_ACCESS_TTL_SECONDS: "900"
      JWT_REFRESH_TTL_SECONDS: "2592000"
      ALLOW_USER_SIGNUP: "true"
      REQUIRE_VERIFIED_EMAIL_FOR_INGEST: "true"
      MAX_INGEST_BYTES: "1048576"
      DELIVERY_MAX_ATTEMPTS: "10"
      DELIVERY_BACKOFF_BASE_SECONDS: "5"
      DELIVERY_BACKOFF_MAX_SECONDS: "1800"
      BARK_REQUEST_TIMEOUT_SECONDS: "5"
      BARK_BLOCK_PRIVATE_NETWORKS: "true"
      NTFY_REQUEST_TIMEOUT_SECONDS: "5"
      NTFY_BLOCK_PRIVATE_NETWORKS: "true"
      MQTT_SOCKET_TIMEOUT_SECONDS: "5"
      MQTT_BLOCK_PRIVATE_NETWORKS: "true"
    expose:
      - "8100"
    volumes:
      - sqlite_data:/data
    networks:
      - herald
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://127.0.0.1:8100/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    image: ghcr.io/coachpo/herald-backend:${HERALD_VERSION:-latest}
    command: ["python", "manage.py", "deliveries_worker"]
    env_file:
      - ./backend.env
    environment:
      DJANGO_DEBUG: "false"
      DATABASE_URL: sqlite:////data/db.sqlite3
      SQLITE_TIMEOUT_SECONDS: "30"
      DELIVERY_MAX_ATTEMPTS: "10"
      DELIVERY_BACKOFF_BASE_SECONDS: "5"
      DELIVERY_BACKOFF_MAX_SECONDS: "1800"
      BARK_REQUEST_TIMEOUT_SECONDS: "5"
      BARK_BLOCK_PRIVATE_NETWORKS: "true"
      NTFY_REQUEST_TIMEOUT_SECONDS: "5"
      NTFY_BLOCK_PRIVATE_NETWORKS: "true"
      MQTT_SOCKET_TIMEOUT_SECONDS: "5"
      MQTT_BLOCK_PRIVATE_NETWORKS: "true"
    volumes:
      - sqlite_data:/data
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - herald
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true

networks:
  herald:
    driver: bridge

volumes:
  sqlite_data:
