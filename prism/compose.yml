name: prism

services:
  backend:
    image: ghcr.io/coachpo/prism-backend:latest
    restart: unless-stopped
    environment:
      DATABASE_URL: sqlite+aiosqlite:///./data/gateway.db
      HOST: 0.0.0.0
      PORT: 8000
      LOG_LEVEL: info
    expose:
      - "8000"
    volumes:
      - prism_data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sS http://127.0.0.1:8000/health >/dev/null || wget -q -O /dev/null http://127.0.0.1:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  frontend:
    image: ghcr.io/coachpo/prism-frontend:latest
    restart: unless-stopped
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sS http://127.0.0.1:3000/health >/dev/null || wget -q -O /dev/null http://127.0.0.1:3000/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    depends_on:
      backend:
        condition: service_healthy

  reverse-proxy:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${PRISM_HTTP_PORT:-8082}:80"
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sS http://127.0.0.1/health >/dev/null || wget -q -O /dev/null http://127.0.0.1/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  prism_data:
