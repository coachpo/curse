services:
  backend:
    image: ghcr.io/coachpo/cockpit-backend:latest
    env_file: ./.env
    command:
      - /cockpit/cockpit
      - --host
      - 0.0.0.0
      - --port
      - "8080"
    ports:
      - "${COCKPIT_PORT:-8082}:8080"
    volumes:
      - nacos-cache:/tmp/nacos/cache
      - nacos-log:/tmp/nacos/log
    restart: unless-stopped

volumes:
  nacos-cache:
  nacos-log:
